<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Planilla de Cálculos</title>
    <link rel="stylesheet" href="static/css/inicio.css">
</head>

<body>

    <div class="container">
        <h1>VERIFICACIÓN DE PLANILLA DE CÁLCULOS</h1>

        <div class="selectors-container">
            <div class="select-group">
                <select id="sel_patron">
                    <option value="" disabled selected>PATRÓN</option>
                    <option value="MPT-10">MPT-10</option>
                    <option value="MPT-39">MPT-39</option>
                    <option value="MPT-47">MPT-47</option>
                    <option value="MPT-46">MPT-46</option>
                    <option value="MPT-09">MPT-09</option>
                    <option value="MPT-08">MPT-08</option>
                    <option value="MPT-78">MPT-78</option>
                    <option value="MPT-34">MPT-34</option>
                    <option value="MPT-60">MPT-60</option>
                    <option value="MPT-73">MPT-73</option>
                    <option value="MPT-75">MPT-75</option>
                    <option value="MPT-74">MPT-74</option>
                    <option value="MPT-76">MPT-76</option>
                </select>
            </div>
            <div class="select-group">
                <select id="sel_clase">
                    <option value="" disabled selected>CLASE</option>
                    <option value="E1">E1</option>
                    <option value="E2">E2</option>
                    <option value="F1">F1</option>
                    <option value="F2">F2</option>
                    <option value="M1">M1</option>
                    <option value="M2">M2</option>
                    <option value="M3">M3</option>
                </select>
            </div>
            <div class="select-group">
                <select id="sel_nominal">
                    <option value="" disabled selected>VALOR NOMINAL</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                    <option value="1000">1000 kg (solo este caso especial)</option>
                </select>
            </div>
            <div class="select-group">
                <select id="sel_unidades">
                    <option value="" disabled selected>UNIDADES</option>
                    <option value="mg">mg</option>
                    <option value="g">g</option>
                    <option value="kg">kg</option>
                </select>
            </div>
            <div class="select-group">
                <select id="sel_termo">
                    <option value="" disabled selected>TERMOHIGRÓMETRO</option>
                    <option value="MEA-12">MEA-12</option>
                    <option value="MEA-20">MEA-20</option>
                    <option value="TH-LM-05">TH-LM-05</option>
                </select>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="panel-title">DATOS DE PATRÓN</div>
                <div class="data-grid">
                    <div class="label">Mc</div>
                    <div class="value"><input type="text" id="out_mc" readonly placeholder="..."></div>

                    <div class="label">u</div>
                    <div class="value"><input type="text" id="out_u" readonly placeholder="..."></div>

                    <div class="label">U DENSIDAD<br>K=1</div>
                    <div class="value"><input type="text" id="out_densidad" readonly placeholder="..."></div>

                    <div class="label">COMPARADOR</div>
                    <div class="value"><input type="text" id="out_comparador" readonly placeholder="..."></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel-title">DATOS DE MEDICIÓN</div>
                <div class="section-title">CONDICIONES INICIALES</div>
                <div class="conditions-row">
                    <label>Hora : <input type="time" id="ini_hora"></label>
                    <label>Fecha: <input type="date" id="ini_fecha"></label>
                </div>
                <div class="conditions-row">
                    <label>Temperatura : <input type="text" id="ini_temp"></label>
                    <label>Humedad (id) : <input type="text" id="ini_hum"></label>
                    <label>Pres. Atm. : <input type="text" id="ini_pres"></label>
                </div>

                <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>MEDICIONES</span>
                    <span>
                        <label>Ciclos <input type="number" id="num_ciclos"
                                style="width:50px; background:var(--input-bg); border:1px solid #cbd5e0;"></label>
                    </span>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>CICLO 1</th>
                            <th>CICLO 2</th>
                            <th>CICLO 3</th>
                            <th>CICLO 4</th>
                            <th>CICLO 5</th>
                            <th>CICLO 6</th>
                            <th>CICLO 7</th>
                            <th>CICLO 8</th>
                        </tr>
                    </thead>
                    <tbody id="mediciones_body">
                        <tr>
                            <th>A</th>
                            <td><input type="number" class="val-a1"></td>
                            <td><input type="number" class="val-a1"></td>
                            <td><input type="number" class="val-a1"></td>
                            <td><input type="number" class="val-a1"></td>
                            <td><input type="number" class="val-a1"></td>
                            <td><input type="number" class="val-a1"></td>
                            <td><input type="number" class="val-a1"></td>
                            <td><input type="number" class="val-a1"></td>
                        </tr>
                        <tr>
                            <th>B</th>
                            <td><input type="number" class="val-b1"></td>
                            <td><input type="number" class="val-b1"></td>
                            <td><input type="number" class="val-b1"></td>
                            <td><input type="number" class="val-b1"></td>
                            <td><input type="number" class="val-b1"></td>
                            <td><input type="number" class="val-b1"></td>
                            <td><input type="number" class="val-b1"></td>
                            <td><input type="number" class="val-b1"></td>
                        </tr>
                        <tr>
                            <th>B</th>
                            <td><input type="number" class="val-b2"></td>
                            <td><input type="number" class="val-b2"></td>
                            <td><input type="number" class="val-b2"></td>
                            <td><input type="number" class="val-b2"></td>
                            <td><input type="number" class="val-b2"></td>
                            <td><input type="number" class="val-b2"></td>
                            <td><input type="number" class="val-b2"></td>
                            <td><input type="number" class="val-b2"></td>
                        </tr>
                        <tr>
                            <th>A</th>
                            <td><input type="number" class="val-a2"></td>
                            <td><input type="number" class="val-a2"></td>
                            <td><input type="number" class="val-a2"></td>
                            <td><input type="number" class="val-a2"></td>
                            <td><input type="number" class="val-a2"></td>
                            <td><input type="number" class="val-a2"></td>
                            <td><input type="number" class="val-a2"></td>
                            <td><input type="number" class="val-a2"></td>
                        </tr>
                        <tr class="am-row">
                            <th>Δm</th>
                            <td><input type="text" id="delta_1" readonly placeholder="#¡DIV/0!"></td>
                            <td><input type="text" id="delta_2" readonly placeholder="#¡DIV/0!"></td>
                            <td><input type="text" id="delta_3" readonly placeholder="#¡DIV/0!"></td>
                            <td><input type="text" id="delta_4" readonly placeholder="#¡DIV/0!"></td>
                            <td><input type="text" id="delta_5" readonly placeholder="#¡DIV/0!"></td>
                            <td><input type="text" id="delta_6" readonly placeholder="#¡DIV/0!"></td>
                            <td><input type="text" id="delta_7" readonly placeholder="#¡DIV/0!"></td>
                            <td><input type="text" id="delta_8" readonly placeholder="#¡DIV/0!"></td>
                        </tr>
                    </tbody>
                </table>

                <div class="section-title">CONDICIONES FINALES</div>
                <div class="conditions-row">
                    <label>Temperatura : <input type="text" id="fin_temp"></label>
                    <label>Humedad : <input type="text" id="fin_hum"></label>
                    <label>Pres. Atm. : <input type="text" id="fin_pres"></label>
                </div>
            </div>
        </div>

        <div class="bottom-actions">
            <button class="btn-calcular" onclick="ejecutarCalculo()">CALCULAR</button>
            <div class="results-container">
                <input type="text" id="resultado_1" readonly placeholder="">
                <input type="text" id="resultado_2" readonly placeholder="">
                <input type="text" id="resultado_3" readonly placeholder="">
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
